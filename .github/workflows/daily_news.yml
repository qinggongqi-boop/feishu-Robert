name: Daily AI News

on:
  push:
    branches:
      - main
  schedule:
    - cron: "13 1 * * *"
  workflow_dispatch:
    inputs:
      test_feishu:
        description: "Send a minimal Feishu test message instead of the daily digest"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  daily-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore sent URL database
        uses: actions/cache@v4
        with:
          path: data/sent_urls.sqlite3
          key: sent-urls-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            sent-urls-${{ runner.os }}-

      - name: Run daily news job
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          FEISHU_KEYWORD: ${{ secrets.FEISHU_KEYWORD }}
          APP_TIMEZONE: Asia/Shanghai
          FEISHU_MESSAGE_FORMAT: post
          MAX_NEWS_ITEMS: "15"
        run: |
          set -o pipefail
          mkdir -p logs
          if [ "${{ github.event.inputs.test_feishu || 'false' }}" = "true" ]; then
            python main.py --test-feishu --send 2>&1 | tee logs/daily_news.log
          else
            python main.py --send 2>&1 | tee logs/daily_news.log
          fi

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-logs
          path: logs/daily_news.log
          if-no-files-found: warn
