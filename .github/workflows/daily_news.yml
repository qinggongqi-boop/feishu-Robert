name: Daily AI News

on:
  push:
    branches:
      - main
  schedule:
    # Beijing time 09:05 on weekdays.
    - cron: "5 1 * * 1-5"
    # Beijing time 11:01 on weekends.
    - cron: "1 3 * * 6,0"
  workflow_dispatch:
    inputs:
      test_feishu:
        description: "Send a minimal Feishu test message instead of the daily digest"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  daily-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore sent URL database
        uses: actions/cache@v4
        with:
          path: data/sent_urls.sqlite3
          key: sent-urls-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            sent-urls-${{ runner.os }}-

      - name: Restore report pages
        uses: actions/cache@v4
        with:
          path: docs
          key: report-pages-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            report-pages-${{ runner.os }}-

      - name: Generate daily news report
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          OPENAI_SUMMARY_API_KEY: ${{ secrets.OPENAI_SUMMARY_API_KEY }}
          OPENAI_SUMMARY_BASE_URL: ${{ secrets.OPENAI_SUMMARY_BASE_URL }}
          OPENAI_SUMMARY_MODEL: ${{ secrets.OPENAI_SUMMARY_MODEL }}
          OPENAI_SUMMARY_TIMEOUT_SECONDS: "20"
          VOLCENGINE_ACCESS_KEY_ID: ${{ secrets.VOLCENGINE_ACCESS_KEY_ID }}
          VOLCENGINE_SECRET_ACCESS_KEY: ${{ secrets.VOLCENGINE_SECRET_ACCESS_KEY }}
          VOLCENGINE_REGION: ${{ secrets.VOLCENGINE_REGION }}
          AZURE_TRANSLATOR_KEY: ${{ secrets.AZURE_TRANSLATOR_KEY }}
          AZURE_TRANSLATOR_REGION: ${{ secrets.AZURE_TRANSLATOR_REGION }}
          FEISHU_KEYWORD: ${{ secrets.FEISHU_KEYWORD }}
          APP_TIMEZONE: Asia/Shanghai
          MAX_NEWS_ITEMS: "15"
          OPENAI_SUMMARY_ENABLED: "true"
          REPORT_BASE_URL: https://qinggongqi-boop.github.io/feishu-Robert
          REPORT_OUTPUT_DIR: docs
          REPORT_KEEP_DAYS: "7"
        run: |
          set -o pipefail
          mkdir -p logs
          if [ "${{ github.event.inputs.test_feishu || 'false' }}" = "true" ]; then
            python main.py --test-feishu 2>&1 | tee logs/daily_news.log
          else
            python main.py --write-meta logs/report_meta.json 2>&1 | tee logs/daily_news.log
          fi

      - name: Configure GitHub Pages
        if: ${{ github.event.inputs.test_feishu != 'true' }}
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: ${{ github.event.inputs.test_feishu != 'true' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy GitHub Pages
        if: ${{ github.event.inputs.test_feishu != 'true' }}
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send Feishu link notification
        if: ${{ github.event.inputs.test_feishu != 'true' }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          APP_TIMEZONE: Asia/Shanghai
          REPORT_BASE_URL: https://qinggongqi-boop.github.io/feishu-Robert
          REPORT_OUTPUT_DIR: docs
          REPORT_KEEP_DAYS: "7"
        run: |
          set -o pipefail
          python main.py --notify-meta logs/report_meta.json --send 2>&1 | tee -a logs/daily_news.log

      - name: Send Feishu webhook test
        if: ${{ github.event.inputs.test_feishu == 'true' }}
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_KEYWORD: ${{ secrets.FEISHU_KEYWORD }}
        run: |
          set -o pipefail
          python main.py --test-feishu --send 2>&1 | tee -a logs/daily_news.log

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-logs
          path: logs/daily_news.log
          if-no-files-found: warn
